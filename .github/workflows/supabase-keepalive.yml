name: Supabase Keep Alive Heartbeat

on:
  schedule:
    # Runs every 12 hours at 00:00 and 12:00 UTC to prevent Supabase inactivity pausing
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database Endpoint
        run: |
          echo "Pinging Supabase project endpoint to maintain active status..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvcWxsbXdtb2p5enZhdGhpcmRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MzE5NTAsImV4cCI6MjEwMDIwNzk1MH0.aTgkvp7erLcPj334U09NjQ57M99KOPxI_Oj8cEN8Yas' }}" \
            "https://soqllmwmojyzvathirdd.supabase.co/rest/v1/profiles?select=id&limit=1")
          echo "Supabase HTTP Response Code: $STATUS"
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 206 ]; then
            echo "Supabase is active and healthy!"
          else
            echo "Warning: Received HTTP status $STATUS"
          fi
