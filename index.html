<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>BeforeSpend - Master Your Income</title>
    
    <!-- PWA & Mobile Settings -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <meta name="theme-color" content="#00A896" />
    <meta name="description" content="Master your income before it leaves your hands. Simple income splitting, bank statement imports, and expense tracking." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BeforeSpend" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
        const isLocalhost = Boolean(
          window.location.hostname === 'localhost' ||
          window.location.hostname === '[::1]' ||
          window.location.hostname.match(/^127(?:\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)){3}$/)
        );

        if (isLocalhost) {
          // Unregister any active service worker in local dev mode
          navigator.serviceWorker.ready.then((registration) => {
            registration.unregister();
          }).catch(() => {});
        } else {
          // Register PWA service worker in production
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => console.log('BeforeSpend ServiceWorker registered:', reg.scope))
              .catch(err => console.log('BeforeSpend ServiceWorker registration failed:', err));
          });
        }
      }
    </script>
  </body>
</html>
